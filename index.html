<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>TJA Converter</title>
  <meta name="description" content="TJAを変換するツールです(大小反転、等速変換、全面、全縁、密度変更)">
  <meta name="keywords" content="太鼓の達人,tja,創作譜面,ツール,等速,変換">
  <meta name="author" content="りょう">
  <meta name="theme-color" content="#f34728">

  <link rel="icon" href="./assets/favicon.png" type="image/png"/>
  <link rel="apple-touch-icon" href="./assets/favicon.png" />

  <meta property="og:title" content="tja-converter">
  <meta property="og:description" content="TJAを変換するツールです(大小反転、等速変換、全面、全縁)">
  <meta property="og:image" content="https://veda00133912.github.io/tja-converter/assets/og-image.png">
  <meta property="og:url" content="https://veda00133912.github.io/tja-converter/">
  <meta property="og:type" content="website">

  <meta name="twitter:card" content="summary_large_image">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>TJA Converter</h1>
    <p>
      TJAを指定した形式で変換します<br>
      大小反転、等速変換、全面、全縁、密度変更
    </p>

    <textarea id="input" placeholder="ここにtjaを貼り付け"></textarea>

    <div class="buttons">
      <button id="convertBtn" onclick="convert()" disabled>大小反転</button>
      <button id="convertDonBtn" onclick="convertToDon()" disabled>全部ドン</button>
      <button id="convertKaBtn" onclick="convertToKa()" disabled>全部カッ</button>
      <button id="convertEqualBtn" onclick="convertEqualSpeedPrompt()" disabled>等速変換</button>
      <button id="convertAltBtn" onclick="convertAlternateSize()" disabled>大小交互</button>
      <button id="convertDensityBtn" onclick="convertDensityPrompt()" disabled>密度変更</button>
      <button id="copyBtn" onclick="copyOutput()" disabled>コピー</button>
    </div>

    <textarea id="output" readonly placeholder="変換結果"></textarea>
  </div>

  <footer>
    <p>&copy; 2026 りょう All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
